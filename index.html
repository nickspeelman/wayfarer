<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Wayfarer</title>
  <link rel="stylesheet" href="css/styles.css" />
</head>
<body>
  <div id="controls">
    <label for="stepSlider">Steps:</label>
    <input type="range" id="stepSlider" min="15" max="100" value="15" />
    <span id="stepValue">15</span>
    <button id="startButton">Start</button>



    <label>
      <input type="checkbox" id="stepToggle" checked /> Show Step Counter
    </label>
  </div>


  <div id="stepCounter">Step 0</div>

<div id="gridWrapper">
  <div id="gridScaler"> <!-- ⬅️ Add this -->
    <div id="gridContainer"></div>
  </div>
</div>



  <div id="noteModal" class="hidden">
    <div id="noteContent">
      <textarea id="noteText" placeholder="Type your reflection..."></textarea>
      <button id="closeNote">Close</button>
    </div>
  </div>

  <div id="centerModal" class="modalOverlay hidden">
    <div class="modalBox">
      <h1>CENTER</h1>
      <button id="returnBtn">Return</button>
    </div>
  </div>


  <div id="completionMessage">
    <div class="modalBox">
      <h1>You have returned.</h1>
      <button id="restartButton">Start Over</button>
    </div>
  </div>




  <script type="module" src="js/main.js"></script>
</body>
</html>
